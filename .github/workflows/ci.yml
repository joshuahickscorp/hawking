name: CI

on:
  push:
    branches: [main, "harden/**"]
  pull_request:

concurrency:
  group: ci-${{ github.ref }}
  cancel-in-progress: true

env:
  CARGO_TERM_COLOR: always

jobs:
  check:
    name: fmt · clippy · build · test
    # Apple Silicon runner — real Metal GPU, matches the target platform.
    runs-on: macos-14
    steps:
      - uses: actions/checkout@v4
        with:
          # Canonical compatibility loaders verify retired commands against the
          # pinned baseline commit, so CI must include repository history.
          fetch-depth: 0

      - name: Install Rust (stable + rustfmt + clippy)
        uses: dtolnay/rust-toolchain@stable
        with:
          components: rustfmt, clippy

      - name: Cache cargo registry + target
        uses: Swatinem/rust-cache@v2

      - name: Condensation contract
        run: |
          python3 tools/repo_shape.py --check
          python3 tools/condense/doctor_v5_profiles.py selftest

      # No `--all`: it descends into the workspace-excluded vendor/ crates (the
      # absorbed STRAND quant track), which keep their upstream formatting. Plain
      # `cargo fmt` checks the workspace members only.
      - name: Format check
        run: cargo fmt -- --check

      # Deny warnings, with external (objc cfg) and a few pedantic lints
      # allowlisted. Any NEW lint of an un-allowed kind fails the build.
      - name: Clippy
        run: |
          cargo clippy --workspace -- -D warnings \
            -A unexpected_cfgs \
            -A unused_assignments \
            -A clippy::should_implement_trait \
            -A clippy::type_complexity \
            -A clippy::too_many_arguments

      - name: Build
        run: cargo build --workspace

      # Compile every test target, including the GPU/model parity gates, so a
      # broken test can't hide behind a skip.
      - name: Compile all tests
        run: cargo test --workspace --no-run

      # Run the deterministic unit tests (no model weights or GPU required).
      # Model-dependent parity gates skip cleanly when weights are absent; the
      # independent-oracle (llama.cpp) gate runs once a small fixture is wired.
      - name: Unit tests
        run: cargo test --workspace --lib --bins

  frontend:
    name: typecheck · test · build (frontend)
    runs-on: macos-14
    defaults:
      run:
        working-directory: app
    steps:
      - uses: actions/checkout@v4

      - uses: pnpm/action-setup@v4
        with:
          version: 10

      - uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: pnpm
          cache-dependency-path: app/pnpm-lock.yaml

      - name: Install
        run: pnpm install --frozen-lockfile

      - name: Typecheck
        run: pnpm typecheck

      - name: Test (includes the voice / banned-character gate)
        run: pnpm test

      # Build with the PRODUCTION transport so the shipped bundle binds the real engine, never the mock.
      - name: Build (live transport)
        run: VITE_HIDE_TRANSPORT=live pnpm build

      # Tripwire: the mock must tree-shake out of a production build. If any mock identifier survives,
      # the DMG could ship demo-ware; fail loudly.
      - name: No mock in the production bundle
        run: |
          if grep -rlE "MockTransport|MOCK_SESSION" dist/assets/*.js; then
            echo "mock transport leaked into the production bundle"
            exit 1
          fi
          echo "clean: no mock in the production bundle"
