[workspace]
resolver = "2"
members = [
    "crates/dismantle",
    "crates/dismantle-core",
    "crates/dismantle-serve",
    "crates/dismantle-bench",
    "tools/q4k_fast",
]

[workspace.package]
version = "0.2.2"
edition = "2021"
rust-version = "1.80"
license = "MIT"
repository = "https://github.com/joshuahickscorp/dismantle"
authors = ["Joshua Hicks <joshuahicksboba@gmail.com>"]

[workspace.dependencies]
anyhow = "1.0"
thiserror = "2.0"
tokio = { version = "1", features = ["full"] }
axum = { version = "0.8", features = ["macros"] }
clap = { version = "4", features = ["derive"] }
tracing = "0.1"
tracing-subscriber = { version = "0.3", features = ["env-filter"] }
serde = { version = "1", features = ["derive"] }
serde_json = "1"
memmap2 = "0.9"
half = { version = "2", features = ["bytemuck"] }
bytemuck = { version = "1", features = ["derive"] }
tokenizers = { version = "0.20", default-features = false, features = ["onig"] }
rand = "0.8"
rand_pcg = "0.3"
sha2 = "0.10"
crossbeam-channel = "0.5"
tokio-stream = "0.1"
futures = "0.3"
parking_lot = "0.12"
once_cell = "1"
ctrlc = "3"
metal = "0.29"
objc2 = "0.5"
objc2-foundation = "0.2"
objc2-metal = "0.2"

[profile.release]
opt-level = 3
lto = "fat"
codegen-units = 1
panic = "abort"
strip = "symbols"

[profile.bench]
inherits = "release"
debug = true
