[package]
name = "hide-serve"
version.workspace = true
edition.workspace = true
rust-version.workspace = true
license.workspace = true
repository.workspace = true
authors.workspace = true
description = "Localhost HTTP + WebSocket transport exposing hide-backend::BackendHost to the HIDE web front end"

[lib]
name = "hide_serve"
path = "src/lib.rs"

[[bin]]
name = "hide-serve"
path = "src/main.rs"

[dependencies]
# T5: HIDE talks HTTP only. Depend on the backend host and the wire types,
# NOT on hawking-core / hawking-serve.
hide-backend = { path = "../hide-backend" }
hide-core = { path = "../hide-core" }
anyhow = { workspace = true }
tokio = { workspace = true }
# Inherit the workspace axum pin, plus the `ws` feature for the built-in
# WebSocket support (Wire-B). Additive on this crate only; the root
# [workspace.dependencies] is untouched.
axum = { workspace = true, features = ["ws"] }
serde = { workspace = true }
serde_json = { workspace = true }
tracing = { workspace = true }
tracing-subscriber = { workspace = true }

[dev-dependencies]
# Pulled in via axum's tree already; exposes the oneshot test harness without
# adding new crates to the lockfile.
tower = { version = "0.5", features = ["util"] }
http-body-util = "0.1"
