[package]
name = "hide-security"
version.workspace = true
edition.workspace = true
rust-version.workspace = true
license.workspace = true
repository.workspace = true
authors.workspace = true
description = "Security infrastructure scaffold for HIDE"

[dependencies]
hide-core = { path = "../hide-core" }
serde = { workspace = true }
serde_json = { workspace = true }
thiserror = { workspace = true }
blake3 = { workspace = true }
regex = { workspace = true }
aes-gcm = { workspace = true }
rand = { workspace = true }

# Real OS-keychain backing for the at-rest wrap key is gated behind a feature so
# the crate builds/tests on CI without a Keychain (and so siblings that depend on
# hide-security don't pull a platform backend they don't need). With `os-keychain`
# on, the macOS Data Protection keychain (apple-native) holds the wrap key; off,
# a documented file-backed dev store is used (clearly marked NON-production).
keyring = { workspace = true, optional = true }

[features]
default = []
os-keychain = ["dep:keyring", "keyring/apple-native"]

[dev-dependencies]
tempfile = "3"
