# strand_bake — offline STRAND (QTIP) weight baker. SEAM — not yet a complete baker.
#
# The STRAND quant backend is now ABSORBED into this repo at `vendor/strand-quant`
# (from ~/Downloads/strand, tag `quant-handoff`). This crate is the offline
# GGUF/safetensors -> `.strand` v2 baker that will consume it. It is deliberately kept
# OUT of the workspace root `members` array so `cargo build` at the root ignores it
# and the dismantle product build stays byte-identical; build it explicitly with
# `cargo build --manifest-path tools/strand_bake/Cargo.toml`.
#
# To finish the baker, follow docs/strand/STRAND-dismantle-wiring.md Step 4: uncomment
# the path dependency below, add it to the root `members`, and implement the GGUF f32
# read -> tensor select -> strand_quant::encode::encode_tensor -> format::write_strand_v2
# pipeline.
[package]
name = "strand_bake_tool"
version.workspace = true
edition.workspace = true
rust-version.workspace = true
license.workspace = true
repository.workspace = true
authors.workspace = true
description = "Offline STRAND (QTIP) weight baker — absorbed backend at vendor/strand-quant; baker pipeline WIP."

[[bin]]
name = "strand_bake"
path = "src/main.rs"

[dependencies]
# Single owner of the .strand v2 wire format + the load-bearing i64 reconstruct.
# Path climbs tools/strand_bake -> tools -> dismantle, into vendor/strand-quant.
# strand-quant = { path = "../../vendor/strand-quant" }
